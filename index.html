<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SA-MP Ultimate Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-white min-h-screen">

<!-- Navbar -->
<nav class="flex justify-between items-center p-4 bg-black/40 backdrop-blur">
  <h1 class="text-2xl font-bold text-blue-400">SA-MP SHOP PRO</h1>
  <div class="flex gap-2">
    <button onclick="login()" class="bg-blue-500 px-4 py-2 rounded-xl">Login</button>
    <button onclick="register()" class="bg-purple-500 px-4 py-2 rounded-xl">Register</button>
    <button onclick="viewCart()" class="bg-green-500 px-4 py-2 rounded-xl">Cart 🛒</button>
  </div>
</nav>

<!-- Hero -->
<section class="text-center py-12">
  <h2 class="text-4xl font-bold mb-2">ร้านขายระบบ SA-MP ระดับโปร</h2>
  <p class="text-gray-400">ระบบครบ จบในที่เดียว พร้อมใช้งานทันที</p>
</section>

<!-- Product List -->
<section id="products" class="grid md:grid-cols-3 gap-6 p-6"></section>

<!-- Cart Modal -->
<div id="cartModal" class="hidden fixed inset-0 bg-black/70 flex justify-center items-center">
  <div class="bg-gray-900 p-6 rounded-2xl w-96">
    <h2 class="text-xl mb-4">ตะกร้าสินค้า</h2>
    <div id="cartItems"></div>
    <button onclick="checkout()" class="bg-green-500 w-full mt-4 py-2 rounded">ชำระเงิน</button>
  </div>
</div>

<!-- Admin Panel -->
<section class="p-6">
  <h2 class="text-2xl mb-4">Admin Panel</h2>
  <input id="name" placeholder="ชื่อสินค้า" class="p-2 text-black rounded" />
  <input id="price" placeholder="ราคา" class="p-2 text-black rounded" />
  <button onclick="addProduct()" class="bg-blue-500 px-4 py-2 rounded">เพิ่มสินค้า</button>
</section>

<script>
// ===== Firebase Config (ใส่ของคุณเอง) =====
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let cart = [];

// ===== Auth =====
function register(){
  let email = prompt("Email");
  let pass = prompt("Password");
  firebase.auth().createUserWithEmailAndPassword(email, pass);
}

function login(){
  let email = prompt("Email");
  let pass = prompt("Password");
  firebase.auth().signInWithEmailAndPassword(email, pass);
}

// ===== Products =====
function loadProducts(){
  db.collection("products").onSnapshot(snap => {
    let html = "";
    snap.forEach(doc => {
      let p = doc.data();
      html += `
        <div class="bg-gray-800 p-4 rounded-2xl shadow-xl hover:scale-105 transition">
          <h3 class="text-xl font-bold">${p.name}</h3>
          <p class="text-green-400">${p.price} บาท</p>
          <button onclick="addToCart('${p.name}', ${p.price})" class="bg-green-500 mt-2 px-4 py-2 rounded w-full">ซื้อ</button>
        </div>`;
    });
    document.getElementById("products").innerHTML = html;
  });
}

function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  db.collection("products").add({name, price});
}

// ===== Cart =====
function addToCart(name, price){
  cart.push({name, price});
  alert("เพิ่มลงตะกร้าแล้ว");
}

function viewCart(){
  let modal = document.getElementById("cartModal");
  modal.classList.remove("hidden");
  let html = "";
  cart.forEach(i => {
    html += `<p>${i.name} - ${i.price} บาท</p>`;
  });
  document.getElementById("cartItems").innerHTML = html;
}

// ===== Payment Mock =====
function checkout(){
  alert("ไปชำระเงิน (PromptPay / TrueMoney)");
  sendToDiscord();
}

// ===== Discord Webhook =====
function sendToDiscord(){
  fetch("YOUR_WEBHOOK", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({content: "มีออเดอร์ใหม่!"})
  });
}

loadProducts();
</script>

</body>
</html>
